{% extends 'base.html' %}

{% block content %}

<div class="card">

<h2>Add Room 🏠</h2>

<form method="POST">

<input type="text"
name="room_number"
placeholder="Room Number">

<input type="text"
name="type"
placeholder="Room Type">

<input type="number"
name="price"
placeholder="Price">

<input type="text"
name="status"
placeholder="Status">

<button type="submit">
    Save
</button>

</form>

</div>

{% endblock %}
